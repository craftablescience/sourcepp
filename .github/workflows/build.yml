name: Build & Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    # nothing here

jobs:
  build:
    name: 'Build (${{matrix.build_type}}, ${{matrix.os}})'
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{matrix.os}}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up MSVC [Windows]
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake (C++)
        run: cmake -G "Ninja" -B build -DCMAKE_BUILD_TYPE=${{matrix.build_type}} -DSOURCEPP_BUILD_TESTS=ON

      - name: Build (C++)
        run: cmake --build build --config ${{matrix.build_type}}

      - name: Test (C++)
        working-directory: '${{github.workspace}}/build'
        run: ctest

      - name: Configure CMake (C)
        run: cmake -G "Ninja" -B build -DCMAKE_BUILD_TYPE=${{matrix.build_type}} -DSOURCEPP_BUILD_C_WRAPPERS=ON

      - name: Build (C)
        run: cmake --build build --config ${{matrix.build_type}}

      - name: Setup .NET Core
        if: matrix.os != 'windows-latest'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10'

      - name: Configure CMake (C#)
        if: matrix.os != 'windows-latest'
        run: cmake -G "Ninja" -B build -DCMAKE_BUILD_TYPE=${{matrix.build_type}} -DSOURCEPP_BUILD_CSHARP_WRAPPERS=ON

      - name: Build (C#)
        if: matrix.os != 'windows-latest'
        run: |
          cmake --build build --config ${{matrix.build_type}}
          dotnet build lang/csharp --configuration Release

      - name: Configure CMake (Python)
        run: cmake -G "Ninja" -B build -DCMAKE_BUILD_TYPE=${{matrix.build_type}} -DSOURCEPP_BUILD_PYTHON_WRAPPERS=ON

      - name: Build (Python)
        working-directory: '${{github.workspace}}/lang/python'
        run: |
          pipx run build --sdist
